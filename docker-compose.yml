services:
  postgres:
    image: postgres:16
    container_name: webhook-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: webhook-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: